syntax = "proto3";

package mt5.ticks;

import "enums.proto";
import "types.proto";
import "google/protobuf/timestamp.proto";

service TickService {
  rpc CopyTicksFrom(TickFromRequest) returns (TicksResponse);
  rpc CopyTicksRange(TickRangeRequest) returns (TicksResponse);
  rpc ListenToSymbols(ListenToSymbolsRequest) returns (stream StreamTickResponse);
}

message TickFromRequest {
  string symbol = 1;
  google.protobuf.Timestamp date_from = 2;
  int32 count = 3;
  enums.CopyTicks flags = 4;
}

message TickRangeRequest {
  string symbol = 1;
  google.protobuf.Timestamp date_from = 2;
  google.protobuf.Timestamp date_to = 3;
  enums.CopyTicks flags = 4;
}

message TicksResponse {
  repeated types.Tick ticks = 1;
}

message ListenToSymbolsRequest {
  repeated string symbols = 1;
}

message StreamTickResponse {
  string symbol = 1;
  types.Tick ticks = 2;
}
